<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda 2026 - Control de Contactos</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 30px; background-color: #f7f9fa; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; borderRadius: 8px; boxShadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; marginBottom: 25px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; marginBottom: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group.full-width { grid-column: span 2; }
        label { fontWeight: 600; marginBottom: 5px; fontSize: 14px; color: #555; }
        input { padding: 10px; border: 1px solid #ccc; borderRadius: 4px; fontSize: 15px; }
        input:focus { border-color: #3498db; outline: none; }
        button { background-color: #2ecc71; color: white; padding: 12px; border: none; borderRadius: 4px; fontSize: 16px; fontWeight: bold; cursor: pointer; transition: background 0.2s; }
        button:hover { background-color: #27ae60; }
        .alert { padding: 12px; borderRadius: 4px; margin-bottom: 20px; fontWeight: bold; text-align: center; display: none; }
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        table { width: 100%; border-collapse: collapse; marginTop: 30px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #34495e; color: white; }
        tr:hover { background-color: #f1f2f6; }
        .empty-msg { text-align: center; color: #7f8c8d; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 Agenda de Contactos 2026</h2>

    <div id="alert-box" class="alert"></div>

    <form id="agenda-form" onsubmit="guardarContacto(event)">
        <div class="form-grid">
            <div class="form-group">
                <label for="rut">RUT (con guión y DV, ej: 12345678-K)</label>
                <input type="text" id="rut" placeholder="12.345.678-K" required>
            </div>
            <div class="form-group">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" placeholder="Juan Pérez" required>
            </div>
            <div class="form-group">
                <label for="empresa">Empresa</label>
                <input type="text" id="empresa" placeholder="Empresa S.A.">
            </div>
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" placeholder="juan@empresa.cl" required>
            </div>
            <div class="form-group">
                <label for="telefono">Teléfono Fijo</label>
                <input type="text" id="telefono" placeholder="22334455">
            </div>
            <div class="form-group">
                <label for="celular">Celular</label>
                <input type="text" id="celular" placeholder="+56912345678" required>
            </div>
        </div>
        <button type="submit" style="width: 100%;">💾 Guardar Contacto</button>
    </form>

    <h3>Contenido en Base de Datos (MySQL)</h3>
    <table>
        <thead>
            <tr>
                <th>RUT</th>
                <th>Nombre</th>
                <th>Empresa</th>
                <th>Celular</th>
                <th>Email</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla-contactos">
            </tbody>
    </table>
    <div id="no-data" class="empty-msg">No hay contactos registrados aún.</div>
</div>

<script>
    const API_URL = 'http://localhost:8080/api/agenda';

    // 1. Cargar y listar los contactos al abrir la página
    async function cargarContactos() {
        try {
            const res = await fetch(API_URL);
            const contactos = await res.json();
            
            const tbody = document.getElementById('tabla-contactos');
            const noData = document.getElementById('no-data');
            tbody.innerHTML = '';

            if (contactos.length === 0) {
                noData.style.display = 'block';
                return;
            }
            
            noData.style.display = 'none';
            contactos.forEach(c => {
                const fila = `
                    <tr>
                        <td><strong>${c.rut}</strong></td>
                        <td>${c.nombre}</td>
                        <td>${c.empresa || '-'}</td>
                        <td>${c.celular}</td>
                        <td>${c.email}</td>
                        <td>
                            <button onclick="eliminarContacto('${c.rut}')" style="background-color: #dc3545; padding: 6px 12px; fontSize: 13px; margin: 0;">❌ Eliminar</button>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += fila;
            });
        } catch (err) {
            mostrarAlerta("Error al conectar con el servidor backend.", "danger");
        }
    }

    // 2. Enviar datos del formulario al backend
    async function guardarContacto(event) {
        event.preventDefault(); // Evita que la página se refresque

        const nuevoContacto = {
            rut: document.getElementById('rut').value,
            nombre: document.getElementById('nombre').value,
            empresa: document.getElementById('empresa').value,
            email: document.getElementById('email').value,
            telefono: document.getElementById('telefono').value,
            celular: document.getElementById('celular').value
        };

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(nuevoContacto)
            });

            const mensaje = await res.text();

            if (res.ok) {
                mostrarAlerta(mensaje, "success");
                document.getElementById('agenda-form').reset(); // Limpia campos
                cargarContactos(); // Refresca la lista
            } else {
                // Si el backend rechazó por RUT inválido cae aquí
                mostrarAlerta(mensaje, "danger");
            }
        } catch (err) {
            mostrarAlerta("Error al intentar guardar el registro.", "danger");
        }
    }

    // 3. Eliminar contacto mediante petición DELETE
    async function eliminarContacto(rut) {
        if (!confirm(`¿Estás seguro de que deseas eliminar al contacto con RUT ${rut}?`)) {
            return; // Cancela si el usuario pincha "Cancelar" en la alerta flotante
        }

        try {
            const res = await fetch(`${API_URL}/${rut}`, {
                method: 'DELETE'
            });

            const mensaje = await res.text();

            if (res.ok) {
                mostrarAlerta(mensaje, "success");
                cargarContactos(); // Refresca la tabla en tiempo real
            } else {
                mostrarAlerta(mensaje, "danger");
            }
        } catch (err) {
            mostrarAlerta("Error al intentar eliminar el registro.", "danger");
        }
    }

    // Función auxiliar para las alertas visuales
    function mostrarAlerta(mensaje, tipo) {
        const box = document.getElementById('alert-box');
        box.innerText = mensaje;
        box.className = `alert alert-${tipo}`;
        box.style.display = 'block';
        
        if(tipo === 'success') {
            setTimeout(() => { box.style.display = 'none'; }, 4000);
        }
    }

    // Ejecución inicial al cargar
    cargarContactos();
</script>
</body>
</html>
